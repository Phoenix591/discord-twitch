[discord]
# The token for your Discord bot (from the Developer Portal)
token = YOUR_DISCORD_BOT_TOKEN_HERE

# The ID of the Discord channel where alerts will be posted
# Right-click a channel in Discord -> Copy Channel ID (Developer Mode required)
channelid = 123456789012345678

[server]
# The domain name your SSL certificate covers
domain = twitch.example.com

# The full public URL Twitch & YouTube should POST data to
# This must match the proxy_pass path in your Nginx config
public_url = https://twitch.example.com/callback

# The internal port the Python script listens on (Nginx forwards to this)
port = 8080

# A random string used to verify authorized takeover requests from Ansible
# Generate one using terminal: openssl rand -hex 32
internal_api_secret = YOUR_RANDOM_INTERNAL_SECRET_HERE

# The DynamoDB table name used to store active streams and schedules
# (Defaults to "discord-twitch-state" if omitted)
dynamodb_table = discord-twitch-state


[twitch]
# Your Twitch Application credentials (from https://dev.twitch.tv/console)
clientid = YOUR_TWITCH_CLIENT_ID_HERE
clientsecret = YOUR_TWITCH_CLIENT_SECRET_HERE

# The list of Twitch streamers to track.
# Format: Twitch_User_ID = Display Name
# Use a tool like StreamWeasels to find numeric User IDs.
12345678 = TwitchStreamerName
87654321 = AnotherTwitchStreamer


[youtube]
# Your YouTube Data API v3 Key (from Google Cloud Console)
api_key = YOUR_YOUTUBE_API_KEY_HERE

# How many past videos to check on startup (Defaults to 2)
backfill_check = 2

# The list of YouTube channels to track.
# Format: YouTube_Channel_ID = Display Name
# Note: Channel IDs usually start with "UC"
UC_x5XG1OV2P6uZZ5FSM9Ttw = GoogleDevelopers
UC_y6XG3OV8P2uZZ1FSM8Tqa = AnotherChannel
